<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="score-value" id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="score-value" id="computerScore">0</span>
            </div>
        </div>
        
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        
        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>Move left paddle: <kbd>Mouse</kbd> or <kbd>↑</kbd><kbd>↓</kbd> Arrow Keys</p>
            <p>Press <kbd>Space</kbd> to start/restart the game</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
