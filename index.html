<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shooter Game</title>
    <link rel="stylesheet" href="style3d.css">
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="hud">
        <div class="hud-top">
            <div class="score-display">
                <span class="label">Score:</span>
                <span class="value" id="score">0</span>
            </div>
            <div class="ammo-display">
                <span class="label">Ammo:</span>
                <span class="value" id="ammo">30</span>
            </div>
            <div class="health-display">
                <span class="label">Health:</span>
                <span class="value" id="health">100</span>
            </div>
        </div>
        
        <div class="crosshair"></div>
        
        <div class="hud-bottom">
            <div class="controls">
                <p><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move | <kbd>Space</kbd> Jump | <kbd>Mouse</kbd> Look | <kbd>Click</kbd> Shoot | <kbd>R</kbd> Reload</p>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script3d.js"></script>
</body>
</html>
